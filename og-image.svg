<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fdf2f8"/>
      <stop offset="30%" style="stop-color:#fce7f3"/>
      <stop offset="60%" style="stop-color:#f0e6ff"/>
      <stop offset="100%" style="stop-color:#e8f4fd"/>
    </linearGradient>
    <linearGradient id="pink" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#b85c8a"/>
      <stop offset="100%" style="stop-color:#e8628a"/>
    </linearGradient>
    <linearGradient id="card" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.9"/>
      <stop offset="100%" style="stop-color:#fff0f5;stop-opacity:0.85"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Decorative circles -->
  <circle cx="100" cy="80" r="60" fill="#ffb7c5" opacity="0.15"/>
  <circle cx="1100" cy="550" r="80" fill="#c4b5fd" opacity="0.12"/>
  <circle cx="1050" cy="100" r="40" fill="#ffb7c5" opacity="0.1"/>
  <circle cx="150" cy="500" r="50" fill="#c4b5fd" opacity="0.1"/>

  <!-- Sakura petals -->
  <text x="80" y="180" font-size="40" opacity="0.2">🌸</text>
  <text x="1080" y="250" font-size="35" opacity="0.15">🌸</text>
  <text x="200" y="580" font-size="30" opacity="0.15">🌸</text>
  <text x="950" y="80" font-size="28" opacity="0.18">🌸</text>
  <text x="50" y="400" font-size="24" opacity="0.12">🌸</text>
  <text x="1130" y="430" font-size="32" opacity="0.13">🌸</text>

  <!-- Main card -->
  <rect x="120" y="80" width="960" height="470" rx="30" fill="url(#card)" stroke="#f8a4c0" stroke-width="2"/>

  <!-- Top decorative bar -->
  <rect x="120" y="80" width="960" height="8" rx="4" fill="url(#pink)"/>

  <!-- Heart icon -->
  <text x="600" y="185" font-size="60" text-anchor="middle">💕</text>

  <!-- Title Japanese -->
  <text x="600" y="250" font-family="'Noto Sans JP', sans-serif" font-size="52" font-weight="700" fill="#b85c8a" text-anchor="middle">仮免許学科試験</text>

  <!-- Subtitle Vietnamese -->
  <text x="600" y="305" font-family="'Nunito', sans-serif" font-size="28" font-weight="600" fill="#8a6d7f" text-anchor="middle">Thi thử bằng lái xe Karimen</text>

  <!-- Divider -->
  <line x1="400" y1="335" x2="800" y2="335" stroke="#f8a4c0" stroke-width="2" stroke-dasharray="8,4"/>

  <!-- Personal message -->
  <text x="600" y="385" font-family="'Nunito', sans-serif" font-size="26" font-weight="700" fill="#c94c73" text-anchor="middle">Dành riêng cho Ngọc Anh 🌸</text>

  <!-- Stats -->
  <text x="600" y="435" font-family="'Nunito', sans-serif" font-size="20" font-weight="600" fill="#9a7b8e" text-anchor="middle">339 câu hỏi ・ Song ngữ 日本語 - Tiếng Việt ・ Giống đề thi thật</text>

  <!-- Encouragement -->
  <text x="600" y="505" font-family="'Nunito', sans-serif" font-size="22" font-weight="600" fill="#b85c8a" text-anchor="middle">頑張れ！きっと合格できるよ！✨</text>

  <!-- Bottom badge -->
  <rect x="440" y="565" width="320" height="42" rx="21" fill="url(#pink)"/>
  <text x="600" y="593" font-family="'Nunito', sans-serif" font-size="18" font-weight="700" fill="white" text-anchor="middle">🚗 Luyện thi mỗi ngày, nhất định đỗ!</text>
</svg>
